<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Nike</title>
</head>
<body>
    <header class="header">
        <div class="logo" aria-label="company name nike">
            <img src="/animated-landingPage-02/image/icons8-nike-250.png" alt="nike logo">
        </div>
        
        <nav class="homepage-navbar">
            <ul class="nav-links">
                <li><a href="#">Men</a></li>
                <li><a href="#">Women</a></li>
                <li><a href="#">Kids</a></li>
                <li><a href="#">Jordan</a></li>
                <li><a href="#">Sport</a></li>
            </ul>
        </nav>
        <div class="header-btns">
            <button class="search-btn">
                <span class="mdi mdi-magnify"></span>
            </button>
            <button class="cart-btn">
                <span class="mdi mdi-shopping-outline"></span>
            </button>
            <button class="menu-toggle" aria-label="Toggle navigation">
                <span class="mdi mdi-menu"></span>
            </button>
        </div>
    </header>
    <main>
        <section class="hero">
            <h2>only one way to find out</h2>
            <h1><span class="leftX">JUST</span> <span class="rightX">DO IT</span></h1>
            <div class="hero-btns">
                <button class="shop">Shop JDI</button>
                <button class="watch">Watch</button>
            </div>
            <div class="scroll">
                <button class="scroll-btn">Scroll
                    <span class="mdi mdi-chevron-double-down"></span>
                </button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
